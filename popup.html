<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 420px; padding: 10px; font-family: Arial, sans-serif; font-size: 13px; }
    button { padding: 6px 14px; background: #0078D7; color: white; border: none; cursor: pointer; border-radius: 4px; }
    button:hover { background: #005A9E; }
    button:disabled { background: #888; cursor: default; }
    #linkList { max-height: 400px; overflow-y: auto; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }
    .group { border-bottom: 1px solid #ddd; }
    .group:last-child { border-bottom: none; }
    .group-header { display: flex; align-items: center; padding: 6px 8px; background: #f5f5f5; cursor: pointer; user-select: none; }
    .group-header input { margin-right: 8px; }
    .group-header .arrow { width: 16px; font-size: 10px; transition: transform 0.15s; display: inline-block; }
    .group-header .arrow.open { transform: rotate(90deg); }
    .group-header .p-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #333; font-weight: 600; }
    .group-header .p-count { color: #888; font-size: 11px; margin-left: 6px; }
    .group-links { display: none; }
    .group-links.open { display: block; }
    .link-row { display: flex; align-items: center; padding: 3px 8px 3px 40px; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
    .link-row:last-child { border-bottom: none; }
    .link-row input { margin-right: 8px; }
    .link-row label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; color: #555; }
    #actions { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    #count { font-size: 12px; color: #666; }
    #status { font-size: 12px; color: #0078D7; margin-top: 4px; }
    #selectAllRow { display: flex; gap: 10px; padding: 4px 8px; border-bottom: 1px solid #ddd; font-size: 12px; }
    #selectAllRow label { cursor: pointer; }
  </style>
</head>
<body>
  <button id="fetchBtn">Scan for Links</button>
  <div id="linkList" style="display:none;">
    <div id="selectAllRow" style="display:none;">
      <label><input type="checkbox" id="selectAll" checked> Select / Deselect All</label>
    </div>
  </div>
  <div id="actions" style="display:none;">
    <button id="downloadBtn">Download Selected</button>
    <span id="count"></span>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
